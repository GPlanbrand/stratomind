<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- 内部光晕 -->
  <circle cx="50" cy="50" r="40" fill="url(#shineGradient)"/>
  
  <!-- 星星/灵感符号 -->
  <g fill="#fff" opacity="0.95">
    <!-- 主体星星 -->
    <path d="M50 20 L53 35 L68 35 L56 44 L60 58 L50 50 L40 58 L44 44 L32 35 L47 35 Z"/>
    
    <!-- 小装饰星星 -->
    <circle cx="28" cy="55" r="2"/>
    <circle cx="72" cy="55" r="2"/>
    <circle cx="35" cy="70" r="1.5"/>
    <circle cx="65" cy="70" r="1.5"/>
  </g>
  
  <!-- 眼睛/表情 (简约风格) -->
  <g fill="#fff" opacity="0.9">
    <ellipse cx="42" cy="62" rx="3" ry="4"/>
    <ellipse cx="58" cy="62" rx="3" ry="4"/>
  </g>
  
  <!-- 微笑弧线 -->
  <path d="M44 68 Q50 73 56 68" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
